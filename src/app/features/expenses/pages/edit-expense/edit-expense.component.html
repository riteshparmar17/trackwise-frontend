<div class="container py-4">
  <div class="expense-card card p-4 shadow-sm">
    <div class="mb-4">
      <h1 class="h3 fw-bold mb-2">✏️ Edit Expense</h1>

      <p class="text-muted mb-0">Update expense information and receipt.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-semibold"> Date * </label>

        <input
          type="date"
          formControlName="date"
          [ngClass]="{
            'form-control': true,
            'is-invalid': date?.invalid && (date?.dirty || date?.touched),
            'is-valid': date?.valid && (date?.dirty || date?.touched),
          }"
        />

        <div
          *ngIf="date?.invalid && (date?.dirty || date?.touched)"
          class="invalid-feedback"
        >
          Date is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold"> Category * </label>

        <select formControlName="category" class="form-select">
          <option *ngFor="let item of categories" [value]="item">
            {{ item }}
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold"> Vendor / Store * </label>
        <input
          type="text"
          formControlName="vendor"
          class="form-control"
          placeholder="e.g. Shell, Costco, Petro Canada"
          [ngClass]="{
            'form-control': true,
            'is-invalid': vendor?.invalid && (vendor?.dirty || vendor?.touched),
            'is-valid': vendor?.valid && (vendor?.dirty || vendor?.touched),
          }"
        />
        <div
          *ngIf="vendor?.invalid && (vendor?.dirty || vendor?.touched)"
          class="invalid-feedback"
        >
          Vendor / Store name is required.
        </div>
      </div>

      <!-- Total Amount -->
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">
            Total Amount(incl. HST) *
          </label>

          <div class="input-group">
            <span class="input-group-text"> $ </span>

            <input
              type="number"
              step="0.01"
              formControlName="totalAmount"
              placeholder="0.00"
              [ngClass]="{
                'form-control': true,
                'is-invalid':
                  totalAmount?.invalid &&
                  (totalAmount?.dirty || totalAmount?.touched),
                'is-valid':
                  totalAmount?.valid &&
                  (totalAmount?.dirty || totalAmount?.touched),
              }"
            />
          </div>

          <div
            *ngIf="
              totalAmount?.invalid &&
              (totalAmount?.dirty || totalAmount?.touched)
            "
            class="invalid-feedback d-block"
          >
            Enter a total amount including tax
          </div>
        </div>

        <!-- Tax Amount -->

        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold"> HST / Tax </label>

          <div class="input-group">
            <span class="input-group-text"> $ </span>

            <input
              type="number"
              step="0.01"
              formControlName="taxAmount"
              class="form-control"
            />
          </div>
        </div>
      </div>
      <!-- Pre-Tax Amount -->

      <div class="mb-3">
        <label class="form-label fw-semibold"> Pre-Tax Amount </label>

        <div class="input-group">
          <span class="input-group-text"> $ </span>

          <input
            type="number"
            formControlName="preTaxAmount"
            class="form-control bg-light"
            readonly
          />
        </div>
      </div>

      <div
        *ngIf="expense?.receipt?.url && !selectedFile"
        class="alert alert-success"
      >
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <img
              [src]="expense?.receipt?.url"
              class="img-thumbnail mb-2"
              style="max-width: 150px"
            />
          </div>
          <div>
            <a
              [href]="expense?.receipt?.url"
              target="_blank"
              class="btn btn-sm btn-outline-primary me-2"
            >
              View
            </a>
            <button
              type="button"
              class="btn btn-sm btn-outline-danger"
              (click)="deleteReceipt()"
            >
              Remove
            </button>
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold"> Receipt </label>

        <div class="row">
          <div class="col-md-6 mb-1">
            <button
              type="button"
              class="btn btn-outline-primary w-100"
              (click)="cameraInput.click()"
            >
              📷 Take Picture
            </button>
          </div>
          <div class="col-md-6 mb-1">
            <button
              type="button"
              class="btn btn-outline-secondary w-100"
              (click)="fileInput.click()"
            >
              📁 Upload File
            </button>
          </div>
        </div>
        <input
          #cameraInput
          hidden
          type="file"
          accept="image/*"
          capture="environment"
          (change)="onSelectedFile($event)"
        />

        <input
          #fileInput
          hidden
          type="file"
          accept=".jpg,.jpeg,.png,.webp,.heic,.heif"
          (change)="onSelectedFile($event)"
        />
        <div class="small text-muted mb-2">
          JPG, PNG, WEBP, HEIC or HEIF • Max 10MB
        </div>
        <div *ngIf="selectedFile" class="mt-3">
          <div
            class="alert alert-info py-2 d-flex justify-content-between align-items-center mb-0"
          >
            <div *ngIf="previewUrl" class="mt-3">
              <img
                [src]="previewUrl"
                class="img-thumbnail mb-2"
                style="max-width: 200px"
              />
              <div class="small text-success">New receipt selected</div>
            </div>
            <button
              type="button"
              class="btn btn-sm btn-outline-danger"
              (click)="removeSelectedFile()"
            >
              Remove
            </button>
          </div>
          <span>
            {{ selectedFile.name }}
          </span>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold"> Notes </label>

        <textarea rows="3" formControlName="notes" class="form-control">
        </textarea>
      </div>

      <div class="d-flex gap-2">
        <button
          type="submit"
          class="btn btn-warning flex-fill"
          [disabled]="loading"
        >
          <span *ngIf="!loading"> Update Expense </span>

          <span *ngIf="loading"> Saving... </span>
        </button>

        <a routerLink="/expenses" class="btn btn-outline-secondary"> Cancel </a>
      </div>
    </form>
  </div>
</div>
