<div class="card p-4 shadow-sm">
  <div class="text-center mb-4">
    <h1 class="h3 fw-bold">🚗 TrackWise</h1>
    <p class="text-muted">Sign in to your account</p>
  </div>

  <div *ngIf="error" class="alert alert-danger text-center">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input
        type="email"
        class="form-control"
        [ngClass]="{
          'is-invalid': email?.invalid && (email?.dirty || email?.touched),
          'is-valid': email?.valid && (email?.dirty || email?.touched),
        }"
        formControlName="email"
        autofocus
      />
      <div
        *ngIf="email?.invalid && (email?.dirty || email?.touched)"
        class="invalid-feedback"
      >
        <div *ngIf="email?.errors?.['required']">Email is required.</div>
        <div *ngIf="email?.errors?.['email']">Enter a valid email.</div>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input
        type="password"
        class="form-control"
        [ngClass]="{
          'is-invalid':
            password?.invalid && (password?.dirty || password?.touched),
          'is-valid': password?.valid && (password?.dirty || password?.touched),
        }"
        formControlName="password"
      />
      <div
        *ngIf="password?.invalid && (password?.dirty || password?.touched)"
        class="invalid-feedback"
      >
        <div *ngIf="password?.errors?.['required']">Password is required.</div>
      </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          formControlName="remember"
          id="remember"
        />
        <label class="form-check-label small" for="remember">Remember me</label>
      </div>
      <a routerLink="/forgot-password" class="small">Forgot password?</a>
    </div>
    <button type="submit" class="btn btn-primary w-100 mb-3">Log In</button>
    <p class="text-center text-muted small">
      No account? <a routerLink="/register">Create one free</a>
    </p>
  </form>
</div>
