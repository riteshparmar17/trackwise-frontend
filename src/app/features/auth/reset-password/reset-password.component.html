<div class="card p-4 shadow-sm">
  <div class="text-center mb-4">
    <h1 class="h3 fw-bold">🚗 TrackWise</h1>
    <p class="text-muted">Reset Password</p>
  </div>

  <div *ngIf="error" class="alert alert-danger text-center">{{ error }}</div>
  <div *ngIf="message" class="alert alert-success text-center">
    {{ message }}
  </div>

  <h6>Enter your new password below.</h6>

  <form [formGroup]="form" (ngSubmit)="reset()">
    <div class="mb-3">
      <label class="form-label fw-semibold">New Password</label>
      <input
        type="password"
        formControlName="password"
        class="form-control"
        [ngClass]="{
          'is-invalid':
            passwordControl?.invalid &&
            (passwordControl?.dirty || passwordControl?.touched),
          'is-valid':
            passwordControl?.valid &&
            (passwordControl?.dirty || passwordControl?.touched),
        }"
        placeholder="New Password"
      />

      <div
        *ngIf="
          passwordControl?.invalid &&
          (passwordControl?.dirty || passwordControl?.touched)
        "
        class="invalid-feedback"
      >
        <div *ngIf="passwordControl?.errors?.['required']">
          Password is required.
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Confirm Password</label>
      <input
        type="password"
        formControlName="confirmPassword"
        class="form-control"
        placeholder="Confirm Password"
        [ngClass]="{
          'is-invalid':
            confirmPasswordControl?.invalid &&
            (confirmPasswordControl?.touched || confirmPasswordControl?.dirty),
          'is-valid':
            confirmPasswordControl?.valid &&
            (confirmPasswordControl?.touched || confirmPasswordControl?.dirty),
        }"
        placeholder="Confirm Password"
      />

      <div
        *ngIf="
          confirmPasswordControl?.errors?.['required'] &&
          (confirmPasswordControl?.touched || confirmPasswordControl?.dirty)
        "
        class="text-danger small"
      >
        Confirm password is required.
      </div>
      <div
        *ngIf="
          confirmPasswordControl?.errors?.['mismatch'] &&
          (confirmPasswordControl?.touched || confirmPasswordControl?.dirty)
        "
        class="text-danger small"
      >
        Passwords do not match.
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100 mb-3">
      Reset Password
    </button>
  </form>

  <p class="text-center text-muted small">
    <a routerLink="/login">Back to Login</a>
  </p>
</div>
