<div class="card p-4 shadow-sm">
  <div class="text-center mb-4">
    <h1 class="h3 fw-bold">🚗 TrackWise</h1>
    <p class="text-muted">Forgot Password</p>
  </div>

  <div *ngIf="error" class="alert alert-danger text-center">{{ error }}</div>
  <div *ngIf="message" class="alert alert-success text-center">
    {{ message }}
  </div>

  <h6>Enter your email and we will send a reset link valid for 1 hour.</h6>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input
        formControlName="email"
        class="form-control"
        [ngClass]="{
          'is-invalid':
            emailControl?.invalid &&
            (emailControl?.dirty || emailControl?.touched),
          'is-valid':
            emailControl?.valid &&
            (emailControl?.dirty || emailControl?.touched),
        }"
        placeholder="Email"
      />
      <div
        *ngIf="
          emailControl?.invalid &&
          (emailControl?.dirty || emailControl?.touched)
        "
        class="invalid-feedback"
      >
        <div *ngIf="emailControl?.errors?.['required']">Email is required.</div>
        <div *ngIf="emailControl?.errors?.['email']">Enter a valid email.</div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 mb-3">
      Send Reset Link
    </button>
  </form>

  <p class="text-center text-muted small">
    <a routerLink="/login">Back to Login</a>
  </p>
</div>
