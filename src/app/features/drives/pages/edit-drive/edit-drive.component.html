<div class="container py-4">
  <div class="drive-card card p-4 shadow-sm">
    <div class="mb-4">
      <h1 class="h3 fw-bold mb-2">✏️ Complete Drive Log</h1>

      <p class="text-muted mb-0">
        Add the ending odometer reading to complete this trip.
      </p>
    </div>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <!-- Summary -->

    <div class="alert alert-info mb-4">
      <div class="row text-center">
        <div class="col-4">
          <div class="small text-muted">Date</div>
          <strong>{{ drive?.date | date: "mediumDate" }}</strong>
        </div>

        <div class="col-4">
          <div class="small text-muted">Start KM</div>
          <strong>{{ drive?.startKM }}</strong>
        </div>

        <div class="col-4">
          <div class="small text-muted">Purpose</div>
          <strong>{{ drive?.purpose }}</strong>
        </div>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-semibold"> End KM * </label>

        <div class="input-group">
          <input
            type="number"
            step="0.1"
            formControlName="endKM"
            autofocus
            placeholder="Enter odometer reading"
            [ngClass]="{
              'form-control': true,
              'is-invalid': endKM?.invalid && (endKM?.dirty || endKM?.touched),
              'is-valid': endKM?.valid && (endKM?.dirty || endKM?.touched),
            }"
          />

          <span class="input-group-text"> km </span>

          <div
            *ngIf="endKM?.invalid && (endKM?.dirty || endKM?.touched)"
            class="invalid-feedback"
          >
            End KM is required.
          </div>
        </div>
      </div>

      <!-- Distance Preview -->

      <div *ngIf="distancePreview > 0" class="alert alert-success py-2 mb-3">
        Distance driven:
        <strong>{{ distancePreview | number: "1.1-1" }} km</strong>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold"> Purpose </label>

        <select class="form-select" formControlName="purpose">
          <option *ngFor="let item of purposes" [value]="item">
            {{ item }}
          </option>
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold"> Notes </label>

        <textarea
          rows="3"
          formControlName="notes"
          class="form-control"
        ></textarea>
      </div>

      <div class="d-flex gap-2">
        <button
          type="submit"
          class="btn btn-warning flex-fill fw-semibold"
          [disabled]="loading"
        >
          <span *ngIf="!loading"> Complete Entry ✓ </span>

          <span *ngIf="loading"> Saving... </span>
        </button>

        <a routerLink="/drives" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
