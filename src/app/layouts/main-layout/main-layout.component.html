<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/dashboard">🚗 TrackWise</a>
    <button class="navbar-toggler" type="button" (click)="isNavbarCollapsed = !isNavbarCollapsed">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div [ngbCollapse]="isNavbarCollapsed" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/drives" routerLinkActive="active">Drive Logs</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/expenses" routerLinkActive="active">Expenses</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/reports" routerLinkActive="active">Reports</a>
        </li>

        <li class="nav-item ms-3 dropdown" ngbDropdown *ngIf="currentUser">
          <a class="nav-link dropdown-toggle text-white" ngbDropdownToggle role="button" aria-expanded="false">
            👤 {{ currentUser.firstName }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end" ngbDropdownMenu>
            <li><span class="dropdown-item-text small text-muted">{{ currentUser.email }}</span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" routerLink="/settings">Settings</a></li>
            <li><button class="dropdown-item text-danger" type="button" (click)="logout()">Logout</button></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-3">
  <div *ngFor="let msg of messages" class="alert alert-{{ msg.type }} alert-dismissible fade show">
    {{ msg.text }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</div>

<main class="container my-4">
  <router-outlet></router-outlet>
</main>
